<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Widget</title>
    <style>
        /* The Fix: box-sizing ensures padding doesn't push the box over the edge */
        * { box-sizing: border-box; }
        
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #0a84ff; --danger: #ff453a; --success: #32d74b; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 5px; display: flex; justify-content: center; }
        
        .widget-container { width: 100%; max-width: 320px; background: var(--card); padding: 12px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .remaining-val { font-size: 1.5em; font-weight: bold; color: var(--primary); }
        .label { font-size: 0.65em; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

        .progress-bg { background: #333; height: 10px; border-radius: 5px; margin-bottom: 12px; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; width: 100%; transition: width 0.4s ease; }

        .input-row { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 6px; }
        
        /* Fixed: Padding is now inside the width */
        input { 
            background: #2c2c2e; 
            border: 1px solid #3a3a3c; 
            color: white; 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 14px; 
            width: 100%; 
            outline: none;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-top: 6px; 
            width: 100%; 
            font-size: 14px; 
        }

        .history-compact { margin-top: 10px; font-size: 0.8em; border-top: 1px solid #333; padding-top: 8px; }
        .history-row { display: flex; justify-content: space-between; padding: 2px 0; color: #aaa; }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">
            <div><div class="label">Left</div><div class="remaining-val" id="rem">£300.00</div></div>
            <div id="pct-text" style="color:#888; font-size:0.8em">100%</div>
        </div>
        <div class="progress-bg"><div id="fill" class="progress-fill"></div></div>
        <div class="input-row">
            <input type="text" id="n" placeholder="Store">
            <input type="number" id="a" placeholder="£">
        </div>
        <button onclick="log()">Log Spend</button>
        <div class="history-compact" id="hist"></div>
    </div>
    <script>
        let logs = JSON.parse(localStorage.getItem('b_logs')) || [];
        const limit = 300.00;
        function update() {
            const spent = logs.reduce((s, i) => s + i.a, 0);
            const left = Math.max(0, limit - spent);
            document.getElementById('rem').innerText = '£' + left.toFixed(2);
            const p = (left / limit) * 100;
            document.getElementById('fill').style.width = p + '%';
            document.getElementById('fill').style.background = p < 20 ? '#ff453a' : '#32d74b';
            document.getElementById('pct-text').innerText = Math.round(p) + '%';
            document.getElementById('hist').innerHTML = logs.slice(-2).reverse().map(l => `<div class="history-row"><span>${l.n}</span><b>-£${l.a.toFixed(2)}</b></div>`).join('');
        }
        function log() {
            const n = document.getElementById('n').value, a = parseFloat(document.getElementById('a').value);
            if(n && a) { logs.push({n, a}); localStorage.setItem('b_logs', JSON.stringify(logs)); }
            document.getElementById('n').value = ''; document.getElementById('a').value = ''; update();
        }
        update();
    </script>
</body>
</html>
